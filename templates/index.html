<!DOCTYPE html>
<html>
<head>
    <title>Bangalore House Price Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script>

        function form_handler(event) {
            event.preventDefault();
        }

        function send_data() {

            document.querySelector('form').addEventListener("submit", form_handler);

            var fd = new FormData(document.querySelector('form'));

            var xhr = new XMLHttpRequest();

            xhr.open('POST', '/predict', true);

            document.getElementById("prediction").innerHTML =
                "Wait! Predicting Price...";

            xhr.onreadystatechange = function () {

                if (xhr.readyState == XMLHttpRequest.DONE) {

                    document.getElementById("prediction").innerHTML =
                        "Prediction: Rs. " + xhr.responseText +  " Lakhs";

                }
            };

            xhr.send(fd);
        }

    </script>

</head>

<body>

<div class="container">

    <h1 class="text-center mt-4 mb-4">
        Bangalore House Price Prediction
    </h1>

    <form method="POST">

        <div class="row">

            <div class="col-md-6 form-group text-center">
                <label><b>Select Location:</b></label>

                <select class="form-control"
                        id="location"
                        name="location"
                        required>

                    {% for location in locations %}
                    <option value="{{location}}">
                        {{location}}
                    </option>
                    {% endfor %}

                </select>
            </div>


            <div class="col-md-6 form-group text-center">
                <label><b>Enter BHK:</b></label>

                <input type="text"
                       class="form-control"
                       id="bhk"
                       name="bhk"
                       placeholder="Enter BHK"
                       required>
            </div>


            <div class="col-md-6 form-group text-center mt-3">
                <label><b>Enter Bathroom:</b></label>

                <input type="text"
                       class="form-control"
                       id="bath"
                       name="bath"
                       placeholder="Enter Bathroom"
                       required>
            </div>


            <div class="col-md-6 form-group text-center mt-3">
                <label><b>Enter Square Feet:</b></label>

                <input type="text"
                       class="form-control"
                       id="total_sqft"
                       name="total_sqft"
                       placeholder="Enter Square Feet"
                       required>
            </div>


            <div class="col-md-12 mt-4">

                <button type="submit"
                        onclick="send_data()"
                        class="btn btn-primary form-control">

                    Predict Price

                </button>

            </div>

        </div>

    </form>

    <br>

    <div class="text-center">
        <h3>
            <span id="prediction"></span>
        </h3>
    </div>

</div>

</body>
</html>
