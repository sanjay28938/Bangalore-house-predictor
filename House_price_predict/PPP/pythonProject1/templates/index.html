<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body class="bg-dark">
   <div class="row">
     <div class="card" style="width:100%;height:100%, margin-top: 60%">
       <div class="card-header" style=" text-align: center">
           <h1><center>Seshadripuram First Grade College</center></h1>
           <h4><center> Yelahanka New Town , Bengaluru 560064 </center></h4>
           <h5>Department of M.C.A</h5>
         <h1> Welcome to Bengaluru House Price Predictor</h1>
       </div>

       <div class="card-body">
          <form method="post"  accept-charset="utf-8">

            <div class="row">
              <div class="col-md-6 form-group" style="text-align: center">
                  <label><b> Select the Location:</b></label>
                  <select class="selectpicker form-control" id="location" name="location" required="required">
                        {% for location in locations %}
                           <option value="{{location}}">{{location}}</option>
                        {% endfor %}
                  </select>
              </div>
                <div class="col-md-6 form-group" style="text-align: center">
                  <label><b> Enter a BHK:</b></label>
                  <input type="text" class="form-control" id="bhk" name="bhk" placeholder="Enter BHK">
            </div>
                <div class="col-md-6 form-group" style="text-align: center">
                  <label><b> Enter a Bathroom:</b></label>
                  <input type="text" class="form-control" id="bath" name="bath" placeholder="Enter Bathroom">
            </div>
                <div class="col-md-6 form-group" style="text-align: center">
                  <label><b> Enter Square Feet:</b></label>
                  <input type="text" class="form-control" id="total_sqft" name="total_sqft" placeholder="Enter Square Feet">
            </div>
                <div class="col-md-12 form-group">
                    <br><br>
                    <button class="btn btn-binary form-control" onclick="send_data()"> Predict Price </button>
                </div>
          </div>
          </form>
           <br>
            <br>
           <div class="col-md-12" style="text-align:center">
               <h3><span id="Prediction"> </span></h3>
           </div>
           <div class="col-md-15" style="text-align:Right">
               <h3><right>Developed By </right></h3>
               <h4><right> Mr. Anil Kumar S V <conitue> <h6>MCA,UGC-NET, K-SET</h6></conitue></right></h4>
               <h5><right> Assistant professor</right></h5>


           </div>
       </div>
       </div>
     </div>
   <script>

       function form_handler(event) {
       event.preventDefault();  // Corrected syntax here
}

function send_data() {
    document.querySelector('form').addEventListener("submit", form_handler);


    var fd = new FormData(document.querySelector('form'));


    var xhr = new XMLHttpRequest();

    xhr.open('POST', '/predict', true);
     document.getElementById("Prediction").innerHTML = "Wait Predicting Price!!....";

     xhr.onreadystatechange = function() {
    if (xhr.readyState === XMLHttpRequest.DONE) {
        document.getElementById('Prediction').innerHTML = "Prediction: ₹" + xhr.responseText;
    }
};
      xhr.onload = function(){};
      xhr.send(fd);
}





   </script>
   <h5><right>Developed By </right></h5>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
